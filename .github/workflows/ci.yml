name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

defaults:
  run:
    working-directory: 10-backend

jobs:
  quality:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: 10-backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test (unit + integración)
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Validate n8n workflows (JSON)
        working-directory: .
        run: node scripts/validate-n8n.mjs
